name: Build-Abhishek-Music-Pro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Custom Modifications (The Bawal Script)
        run: |
          # 1. App ka Naam Badalna
          find . -name "strings.xml" -exec sed -i 's/SimpMusic/Abhishek Music/g' {} +

          # 2. Liquid Glass ko Default ON karna
          # Hum direct path use kar rahe hain taaki error na aaye
          find . -name "Preferences.kt" -exec sed -i 's/useLiquidGlass\] ?: false/useLiquidGlass\] ?: true/g' {} +

          # 3. Performance Fix (Debug optimization)
          # Isse scrolling smooth ho jayegi
          sed -i 's/minifyEnabled false/minifyEnabled true/g' androidApp/build.gradle.kts || true

      - name: Build Optimized Debug APK
        # Debug build fail nahi hoga aur jaldi banega
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Abhishek-Music-Smooth-Edition
          path: "**/build/outputs/apk/debug/*.apk"
