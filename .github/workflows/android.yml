name: Build-Abhishek-Music-Pro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true # Agar koi submodule ho toh wo bhi load ho jaye

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Custom Modifications (The Bawal Script)
        run: |
          # 1. App ka Naam Badalna
          find . -name "strings.xml" -exec sed -i 's/SimpMusic/Abhishek Music/g' {} +

          # 2. Liquid Glass ko Default ON karna
          find . -name "Preferences.kt" -exec sed -i 's/useLiquidGlass\] ?: false/useLiquidGlass\] ?: true/g' {} +

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build All Modules
        # Is baar hum poore project ko build karenge taaki koi module miss na ho
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Abhishek-Music-Smooth-Edition
          path: "**/build/outputs/apk/debug/*.apk"
