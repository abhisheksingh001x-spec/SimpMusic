name: Build-Abhishek-Music-Pro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Custom Modifications (The Bawal Script)
        run: |
          # 1. App ka Naam Badalna
          find . -name "strings.xml" -exec sed -i 's/SimpMusic/Abhishek Music/g' {} +

          # 2. Liquid Glass ko Default ON karna
          find . -name "Preferences.kt" -exec sed -i 's/useLiquidGlass\] ?: false/useLiquidGlass\] ?: true/g' {} +

          # 3. Performance Fix (Release Optimization)
          # Isse Lag kam hoga aur app smooth chalega
          sed -i 's/debuggable true/debuggable false/g' androidApp/build.gradle.kts || true
          
          # 4. Links & Branding (Optional - Yahan apna link daal sakte ho)
          # find . -type f -name "*.kt" -exec sed -i 's/https:\/\/github.com\/rebelatio\/simpmusic/https:\/\/github.com\/abhishek/g' {} +

      - name: Build Release APK
        # Hum Release build karenge taaki app "Makkhan" chale
        run: ./gradlew :androidApp:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Abhishek-Music-Smooth-Edition
          path: "**/build/outputs/apk/release/*.apk"
